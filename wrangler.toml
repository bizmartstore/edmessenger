name = "edmessenger"
compatibility_date = "2024-12-01"
main = ".output/server/index.mjs"

# Keep the Worker + Supabase project warm
[triggers]
crons = ["*/5 * * * *"]

[assets]
directory = ".output/public"
binding = "ASSETS"
run_worker_first = ["/api/*"]

[vars]
ONESIGNAL_APP_ID = "718bec75-70f7-4936-bdff-5dd26e8c835d"
